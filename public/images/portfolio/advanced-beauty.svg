<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0e18"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E03B37"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="150" cy="650" r="90" fill="none" stroke="#E03B37" stroke-width="1" opacity="0.12"/>
  <circle cx="150" cy="650" r="140" fill="none" stroke="#E03B37" stroke-width="0.5" opacity="0.08"/>
  <circle cx="1050" cy="100" r="70" fill="none" stroke="#E03B37" stroke-width="1" opacity="0.12"/>
  <circle cx="1050" cy="100" r="110" fill="none" stroke="#E03B37" stroke-width="0.5" opacity="0.08"/>
  <!-- Beauty/flower icon -->
  <g transform="translate(600, 270)" opacity="0.8">
    <!-- Petals -->
    <ellipse cx="0" cy="-40" rx="18" ry="35" fill="none" stroke="#E03B37" stroke-width="2" transform="rotate(0)"/>
    <ellipse cx="0" cy="-40" rx="18" ry="35" fill="none" stroke="#E03B37" stroke-width="2" transform="rotate(60)"/>
    <ellipse cx="0" cy="-40" rx="18" ry="35" fill="none" stroke="#E03B37" stroke-width="2" transform="rotate(120)"/>
    <ellipse cx="0" cy="-40" rx="18" ry="35" fill="none" stroke="#E03B37" stroke-width="2" transform="rotate(180)"/>
    <ellipse cx="0" cy="-40" rx="18" ry="35" fill="none" stroke="#E03B37" stroke-width="2" transform="rotate(240)"/>
    <ellipse cx="0" cy="-40" rx="18" ry="35" fill="none" stroke="#E03B37" stroke-width="2" transform="rotate(300)"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="12" fill="#E03B37" opacity="0.3"/>
    <circle cx="0" cy="0" r="6" fill="#E03B37" opacity="0.6"/>
  </g>
  <!-- Sparkles -->
  <g fill="#E03B37" opacity="0.4">
    <polygon points="500,200 503,210 513,210 505,216 508,226 500,220 492,226 495,216 487,210 497,210" transform="scale(0.6)"/>
    <polygon points="1050,350 1053,360 1063,360 1055,366 1058,376 1050,370 1042,376 1045,366 1037,360 1047,360" transform="scale(0.5)"/>
  </g>
  <!-- Title -->
  <text x="600" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="bold" fill="#ffffff" letter-spacing="3">ADVANCED BEAUTY</text>
  <!-- Industry -->
  <text x="600" y="465" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#E03B37" letter-spacing="6">Beauty &amp; Wellness</text>
  <!-- Decorative line -->
  <rect x="500" y="485" width="200" height="2" fill="url(#accent)" opacity="0.5" rx="1"/>
  <!-- Subtle grid dots -->
  <g opacity="0.05" fill="#ffffff">
    <circle cx="100" cy="100" r="2"/><circle cx="150" cy="100" r="2"/><circle cx="200" cy="100" r="2"/>
    <circle cx="100" cy="150" r="2"/><circle cx="150" cy="150" r="2"/><circle cx="200" cy="150" r="2"/>
    <circle cx="1000" cy="600" r="2"/><circle cx="1050" cy="600" r="2"/><circle cx="1100" cy="600" r="2"/>
    <circle cx="1000" cy="650" r="2"/><circle cx="1050" cy="650" r="2"/><circle cx="1100" cy="650" r="2"/>
  </g>
</svg>