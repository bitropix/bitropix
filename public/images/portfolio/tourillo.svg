<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0e18"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E03B37"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="80" fill="none" stroke="#E03B37" stroke-width="1" opacity="0.15"/>
  <circle cx="200" cy="150" r="120" fill="none" stroke="#E03B37" stroke-width="0.5" opacity="0.1"/>
  <circle cx="1000" cy="600" r="100" fill="none" stroke="#E03B37" stroke-width="1" opacity="0.15"/>
  <circle cx="1000" cy="600" r="150" fill="none" stroke="#E03B37" stroke-width="0.5" opacity="0.1"/>
  <!-- Globe icon -->
  <circle cx="600" cy="280" r="70" fill="none" stroke="#E03B37" stroke-width="2.5" opacity="0.8"/>
  <ellipse cx="600" cy="280" rx="35" ry="70" fill="none" stroke="#E03B37" stroke-width="1.5" opacity="0.6"/>
  <line x1="530" y1="280" x2="670" y2="280" stroke="#E03B37" stroke-width="1.5" opacity="0.6"/>
  <line x1="545" y1="245" x2="655" y2="245" stroke="#E03B37" stroke-width="1" opacity="0.4"/>
  <line x1="545" y1="315" x2="655" y2="315" stroke="#E03B37" stroke-width="1" opacity="0.4"/>
  <!-- Airplane -->
  <path d="M650 230 L680 220 L660 240 Z" fill="#E03B37" opacity="0.7"/>
  <line x1="650" y1="230" x2="620" y2="250" stroke="#E03B37" stroke-width="1" opacity="0.4" stroke-dasharray="4,4"/>
  <!-- Title -->
  <text x="600" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="bold" fill="#ffffff" letter-spacing="4">TOURILLO</text>
  <!-- Industry -->
  <text x="600" y="475" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#E03B37" letter-spacing="6" text-transform="uppercase">Travel &amp; Tourism</text>
  <!-- Decorative line -->
  <rect x="500" y="495" width="200" height="2" fill="url(#accent)" opacity="0.5" rx="1"/>
  <!-- Subtle grid dots -->
  <g opacity="0.05" fill="#ffffff">
    <circle cx="100" cy="100" r="2"/><circle cx="150" cy="100" r="2"/><circle cx="200" cy="100" r="2"/><circle cx="250" cy="100" r="2"/>
    <circle cx="100" cy="150" r="2"/><circle cx="150" cy="150" r="2"/><circle cx="250" cy="150" r="2"/>
    <circle cx="950" cy="600" r="2"/><circle cx="1000" cy="600" r="2"/><circle cx="1050" cy="600" r="2"/><circle cx="1100" cy="600" r="2"/>
    <circle cx="950" cy="650" r="2"/><circle cx="1000" cy="650" r="2"/><circle cx="1050" cy="650" r="2"/><circle cx="1100" cy="650" r="2"/>
  </g>
</svg>