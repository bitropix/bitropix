<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0e18"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E03B37"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="200" cy="100" r="80" fill="none" stroke="#E03B37" stroke-width="1" opacity="0.12"/>
  <circle cx="200" cy="100" r="130" fill="none" stroke="#E03B37" stroke-width="0.5" opacity="0.08"/>
  <circle cx="1000" cy="650" r="90" fill="none" stroke="#E03B37" stroke-width="1" opacity="0.12"/>
  <circle cx="1000" cy="650" r="140" fill="none" stroke="#E03B37" stroke-width="0.5" opacity="0.08"/>
  <!-- Building / construction icon -->
  <g transform="translate(600, 270)" opacity="0.8">
    <!-- Main building -->
    <rect x="-30" y="-70" width="60" height="100" fill="none" stroke="#E03B37" stroke-width="2"/>
    <!-- Windows -->
    <rect x="-20" y="-60" width="12" height="12" fill="none" stroke="#E03B37" stroke-width="1" opacity="0.6"/>
    <rect x="8" y="-60" width="12" height="12" fill="none" stroke="#E03B37" stroke-width="1" opacity="0.6"/>
    <rect x="-20" y="-40" width="12" height="12" fill="none" stroke="#E03B37" stroke-width="1" opacity="0.6"/>
    <rect x="8" y="-40" width="12" height="12" fill="none" stroke="#E03B37" stroke-width="1" opacity="0.6"/>
    <rect x="-20" y="-20" width="12" height="12" fill="none" stroke="#E03B37" stroke-width="1" opacity="0.6"/>
    <rect x="8" y="-20" width="12" height="12" fill="none" stroke="#E03B37" stroke-width="1" opacity="0.6"/>
    <!-- Door -->
    <rect x="-8" y="10" width="16" height="20" fill="none" stroke="#E03B37" stroke-width="1.5" opacity="0.7"/>
    <!-- Side building left -->
    <rect x="-65" y="-30" width="35" height="60" fill="none" stroke="#E03B37" stroke-width="1.5" opacity="0.6"/>
    <rect x="-57" y="-22" width="8" height="8" fill="none" stroke="#E03B37" stroke-width="0.8" opacity="0.4"/>
    <rect x="-42" y="-22" width="8" height="8" fill="none" stroke="#E03B37" stroke-width="0.8" opacity="0.4"/>
    <!-- Side building right -->
    <rect x="30" y="-40" width="35" height="70" fill="none" stroke="#E03B37" stroke-width="1.5" opacity="0.6"/>
    <rect x="38" y="-32" width="8" height="8" fill="none" stroke="#E03B37" stroke-width="0.8" opacity="0.4"/>
    <rect x="53" y="-32" width="8" height="8" fill="none" stroke="#E03B37" stroke-width="0.8" opacity="0.4"/>
    <!-- Crane -->
    <line x1="75" y1="30" x2="75" y2="-80" stroke="#E03B37" stroke-width="1.5" opacity="0.5"/>
    <line x1="75" y1="-80" x2="110" y2="-80" stroke="#E03B37" stroke-width="1.5" opacity="0.5"/>
    <line x1="110" y1="-80" x2="110" y2="-60" stroke="#E03B37" stroke-width="1" opacity="0.4"/>
    <line x1="75" y1="-80" x2="60" y2="-80" stroke="#E03B37" stroke-width="1" opacity="0.4"/>
    <!-- Ground -->
    <line x1="-80" y1="30" x2="80" y2="30" stroke="#E03B37" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Title -->
  <text x="600" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="bold" fill="#ffffff" letter-spacing="3">DISHAA VERTEX INFRA</text>
  <!-- Industry -->
  <text x="600" y="475" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#E03B37" letter-spacing="6">Infrastructure &amp; Construction</text>
  <!-- Decorative line -->
  <rect x="500" y="495" width="200" height="2" fill="url(#accent)" opacity="0.5" rx="1"/>
  <!-- Subtle grid dots -->
  <g opacity="0.05" fill="#ffffff">
    <circle cx="100" cy="100" r="2"/><circle cx="150" cy="100" r="2"/><circle cx="200" cy="100" r="2"/>
    <circle cx="100" cy="150" r="2"/><circle cx="150" cy="150" r="2"/><circle cx="200" cy="150" r="2"/>
    <circle cx="1000" cy="600" r="2"/><circle cx="1050" cy="600" r="2"/><circle cx="1100" cy="600" r="2"/>
    <circle cx="1000" cy="650" r="2"/><circle cx="1050" cy="650" r="2"/><circle cx="1100" cy="650" r="2"/>
  </g>
</svg>