<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0e18"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E03B37"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="1100" cy="150" r="90" fill="none" stroke="#E03B37" stroke-width="1" opacity="0.12"/>
  <circle cx="1100" cy="150" r="130" fill="none" stroke="#E03B37" stroke-width="0.5" opacity="0.08"/>
  <circle cx="100" cy="600" r="80" fill="none" stroke="#E03B37" stroke-width="1" opacity="0.12"/>
  <circle cx="100" cy="600" r="120" fill="none" stroke="#E03B37" stroke-width="0.5" opacity="0.08"/>
  <!-- Leaf / plant icon -->
  <g transform="translate(600, 265)" opacity="0.8">
    <!-- Stem -->
    <line x1="0" y1="60" x2="0" y2="-10" stroke="#E03B37" stroke-width="2.5"/>
    <!-- Left leaf -->
    <path d="M0,-10 Q-50,-50 -30,-90 Q-10,-70 0,-10" fill="none" stroke="#E03B37" stroke-width="2"/>
    <line x1="-15" y1="-50" x2="0" y2="-10" stroke="#E03B37" stroke-width="1" opacity="0.5"/>
    <!-- Right leaf -->
    <path d="M0,-10 Q50,-50 30,-90 Q10,-70 0,-10" fill="none" stroke="#E03B37" stroke-width="2"/>
    <line x1="15" y1="-50" x2="0" y2="-10" stroke="#E03B37" stroke-width="1" opacity="0.5"/>
    <!-- Small leaves -->
    <path d="M0,20 Q-30,0 -20,-20 Q-5,5 0,20" fill="none" stroke="#E03B37" stroke-width="1.5" opacity="0.6"/>
    <path d="M0,20 Q30,0 20,-20 Q5,5 0,20" fill="none" stroke="#E03B37" stroke-width="1.5" opacity="0.6"/>
    <!-- Ground line -->
    <line x1="-40" y1="60" x2="40" y2="60" stroke="#E03B37" stroke-width="1.5" opacity="0.4"/>
    <!-- Droplets -->
    <circle cx="-45" cy="-30" r="3" fill="#E03B37" opacity="0.3"/>
    <circle cx="50" cy="-20" r="2" fill="#E03B37" opacity="0.3"/>
    <circle cx="-35" cy="10" r="2.5" fill="#E03B37" opacity="0.25"/>
  </g>
  <!-- Title -->
  <text x="600" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="bold" fill="#ffffff" letter-spacing="3">BEVERLY AGROVET</text>
  <!-- Industry -->
  <text x="600" y="475" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#E03B37" letter-spacing="6">Agriculture &amp; Agrochemicals</text>
  <!-- Decorative line -->
  <rect x="500" y="495" width="200" height="2" fill="url(#accent)" opacity="0.5" rx="1"/>
  <!-- Subtle grid dots -->
  <g opacity="0.05" fill="#ffffff">
    <circle cx="100" cy="100" r="2"/><circle cx="150" cy="100" r="2"/><circle cx="200" cy="100" r="2"/>
    <circle cx="100" cy="150" r="2"/><circle cx="150" cy="150" r="2"/><circle cx="200" cy="150" r="2"/>
    <circle cx="1000" cy="600" r="2"/><circle cx="1050" cy="600" r="2"/><circle cx="1100" cy="600" r="2"/>
    <circle cx="1000" cy="650" r="2"/><circle cx="1050" cy="650" r="2"/><circle cx="1100" cy="650" r="2"/>
  </g>
</svg>